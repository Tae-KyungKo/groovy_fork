name: groovy-fork-CICD-backend # Actions 탭에 표시될 워크플로의 이름.(생략시 파일명으로 대체)
# run-name: []  이 워크플로가 실행될 때 생성되는 개별 실행 건의 이름(Actions 탭의 '실행목록'에 표시됨. 대체 가능)
on:
  push:
    branches:
      - main
    paths:
      - 'groovy/**' ## groovy(백엔드) 폴더 안에 변경 사항이 있을 때만 실행
  pull_request:
    branches:
      - main
    paths:
      - 'groovy/**'

jobs: ## 워크플로에서 실행할모든 작업
  build: ## 작업 1 : build
    runs-on: ubuntu-latest # 이 작업이 실행될 가상 먼신의 os 환경 지정
    steps: # build 작업의 모든 단계들
      - name: Checkout repository code # 레포지토리의 소스코드를 다운로드
        uses: actions/checkout@v6  # 미리 정의된 깃액션 사용하겠다라는 의미 : checkout@v6를 사용 => 레포의 소스코드를 다운로드

      - name: set up JDK 21 # JDK 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle Caching # 빌드 속도를 위한 Gradle 캐시 설정 추가
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grand Execute Permission for Gradlew # 리눅스 환경에서 Gradle 실행 파일을 실행할 수 있는 권한 부여
        run: |
          cd groovy
          chmod +x gradlew

      - name: Build and Test with Gradle # 실제 스프링부트 프로젝트를 빌드하고 테스트 코드를 실행
        run: |
          cd groovy
          ./gradlew build

