services:
  mysql:
    image: mysql:8.0
    container_name: groovy-mysql
    restart: unless-stopped
    environment:
      # 값은 .env(gitignore 대상, docker compose가 같은 경로에서 자동 로드)에서 주입, 코드에는 하드코딩하지 않음
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - groovy-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: groovy-backend
    restart: unless-stopped
    # MySQL 컨테이너가 뜨는 것만으로는 부족하고, healthcheck를 통과해 실제로 쿼리를
    # 받을 수 있는 상태(service_healthy)가 되어야 백엔드가 기동하도록 순서를 강제한다.
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # .env의 값을 컨테이너 내부로 유실 없이 전달한다.
      # 단, DB 접속 주소는 호스트(localhost)가 아닌 도커 내부 서비스명(mysql)을 가리켜야 하므로
      # .env의 SPRING_DEV_DB_URL을 그대로 재사용하지 않고 컴포즈 네트워크 기준으로 재구성한다.
      SPRING_DEV_DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DEV_DB_USERNAME: root
      SPRING_DEV_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-30}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-10}
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  groovy-mysql-data:
