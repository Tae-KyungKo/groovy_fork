services:
  mysql:
    image: mysql:8.0
    container_name: groovy-mysql-local
    restart: unless-stopped
    environment:
      # 값은 .env(gitignore 대상, docker compose가 같은 경로에서 자동 로드)에서 주입, 코드에는 하드코딩하지 않음
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - groovy-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  groovy-mysql-data:
