services:

  frontend:
    image: ${DOCKERHUB_USERNAME}/groovy-frontend:latest

    container_name: groovy-front

    restart: unless-stopped

    # nginx가 정적 파일 서빙과 /api 리버스 프록시를 함께 담당하므로 80번만 외부에 노출한다.
    ports:
      - "80:80"

    depends_on:
      - backend


  backend:
    image: ${DOCKERHUB_USERNAME}/groovy-backend:latest

    container_name: groovy-backend
    restart: unless-stopped           # 이 부분은 새로 추가 됐음

    depends_on:
      mysql:
        condition: service_healthy

    # frontend(nginx)가 도커 내부망(backend:8080)으로만 호출하므로 호스트에 포트를 노출하지 않는다.

    environment:
      SPRING_DEV_DB_URL: ${PROD_DB_URL}
      SPRING_DEV_DB_USERNAME: ${PROD_DB_USERNAME}
      SPRING_DEV_DB_PASSWORD: ${PROD_DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-30}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-10}


  mysql:
    image: mysql:8.0
    container_name: groovy-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - groovy-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  groovy-mysql-data:
