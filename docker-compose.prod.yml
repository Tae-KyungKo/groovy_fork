# EC2 운영 서버 전용 docker-compose 파일
# - 프론트엔드 앞단에 nginx가 아직 없으므로, 당분간은 컨테이너 포트를 그대로 호스트에 노출하는 임시 구성이다.

services:

  frontend:
    image: ${DOCKERHUB_USERNAME}/groovy-frontend:latest

    container_name: groovy-front

    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend


  backend:
    image: ${DOCKERHUB_USERNAME}/groovy-backend:latest

    container_name: groovy-backend

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "${SERVER_PORT:-8080}:8080"

    environment:
      # 운영 DB 접속 정보. PROD_DB_URL은 아래 mysql 서비스(컨테이너 내부 호스트명 "mysql")를
      # 가리키도록 GitHub Secrets에 등록되어 있어야 한다.
      #   예) jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DEV_DB_URL: ${PROD_DB_URL}
      SPRING_DEV_DB_USERNAME: ${PROD_DB_USERNAME}
      SPRING_DEV_DB_PASSWORD: ${PROD_DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-30}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-10}


  mysql:
    image: mysql:8.0
    container_name: groovy-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      # 별도의 MYSQL_ROOT_PASSWORD 시크릿이 없으므로 PROD_DB_PASSWORD 값을 그대로 재사용한다(.env.prod 생성 단계에서 매핑).
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - groovy-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  groovy-mysql-data:
