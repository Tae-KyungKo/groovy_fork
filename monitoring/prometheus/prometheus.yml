global:
  scrape_interval: 10s

scrape_configs:
  - job_name: spring-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend:8080']

  - job_name: mysql
    scrape_interval: 15s
    static_configs:
      - targets: ['mysqld-exporter:9104']

  - job_name: nginx
    scrape_interval: 10s
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: node
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100']
