services:

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile

    container_name: groovy-front

    ports:
      - "5173:5173"

    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_USE_MOCK: ${VITE_USE_MOCK:-false}


    depends_on:
      - backend



  backend:
    build:
      context: ./groovy
      dockerfile: Dockerfile

    container_name: groovy-backend

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "${SERVER_PORT:-8080}:8080"

    environment:
      SPRING_DEV_DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DEV_DB_USERNAME: root
      SPRING_DEV_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-30}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-10}


  mysql:
    image: mysql:8.0
    container_name: groovy-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - groovy-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  groovy-mysql-data: